<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delaware Valley Paving - Automation Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-road"></i>
            <span>DV Paving</span>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-section">
                <span class="nav-label">HUBSPOT CORE</span>
                <a href="#" class="nav-item" data-view="hubspot-native">
                    <i class="fas fa-database"></i>
                    <span>HubSpot Data</span>
                    <span class="badge native">Native</span>
                </a>
            </div>
            
            <div class="nav-section">
                <span class="nav-label">AUTOMATION LAYER</span>
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="enrichment">
                    <i class="fas fa-user-plus"></i>
                    <span>Data Enrichment</span>
                    <span class="badge auto">Auto</span>
                </a>
                <a href="#" class="nav-item" data-view="rfp-router">
                    <i class="fas fa-filter"></i>
                    <span>RFP Alert Router</span>
                    <span class="badge auto">Auto</span>
                </a>
                <a href="#" class="nav-item" data-view="estimator">
                    <i class="fas fa-calculator"></i>
                    <span>Bid Auto-Estimator</span>
                    <span class="badge assist">Assist</span>
                </a>
                <a href="#" class="nav-item" data-view="followup">
                    <i class="fas fa-envelope"></i>
                    <span>Follow-Up Automation</span>
                    <span class="badge auto">Auto</span>
                </a>
                <a href="#" class="nav-item" data-view="competitor">
                    <i class="fas fa-users"></i>
                    <span>Competitor Tracker</span>
                    <span class="badge insight">Insight</span>
                </a>
                <a href="#" class="nav-item" data-view="scheduler">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Weather & Crew</span>
                    <span class="badge ops">Ops</span>
                </a>
            </div>
        </nav>
        
        <div class="sidebar-footer">
            <div class="hubspot-sync">
                <i class="fas fa-sync-alt spinning"></i>
                <span>Syncing with HubSpot...</span>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="top-bar">
            <h1 id="page-title">Automation Dashboard</h1>
            <div class="header-actions">
                <div class="hubspot-status">
                    <i class="fas fa-circle connected"></i>
                    <span>HubSpot Connected</span>
                </div>
                <div class="user-info">
                    <span>CEO Demo Mode</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Container -->
        <div id="content-area" class="content-area">
            <!-- Content will be dynamically loaded here -->
        </div>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
</body>
</html>
